<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrecisionProCare</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--dk:#1F3A5F;--md:#2E6DA4;--lt:#E6F1FB;--tl:#1A7A6E;--tll:#E8F5F3;--gd:#C9A84C;--ok:#2E8B57;--er:#A32D2D;--gy:#F1EFE8;--r:12px;--s:8px}
body{font-family:'DM Sans',sans-serif;background:var(--gy);color:#1a1a2e;min-height:100vh}
nav{background:var(--dk);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.logo{display:flex;align-items:center;gap:10px}
.lc{width:36px;height:36px;background:var(--tl);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;color:#fff;font-size:14px}
.ln{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:#fff}.ln span{color:var(--gd)}
.nav-links{display:flex;gap:4px;flex-wrap:wrap}
.nb{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 12px;border-radius:var(--s);cursor:pointer;transition:all .2s}
.nb:hover{background:rgba(255,255,255,.2)}.nb.on{background:var(--tl);border-color:var(--tl)}
.main{max-width:1200px;margin:0 auto;padding:1.5rem}
.pg{display:none}.pg.on{display:block}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.ph h1{font-family:'Playfair Display',serif;font-size:22px;color:var(--dk)}
.ph p{font-size:12px;color:#888;margin-top:2px}
.card{background:#fff;border-radius:var(--r);padding:1.5rem;box-shadow:0 2px 12px rgba(31,58,95,.08)}
.ct{font-family:'Playfair Display',serif;font-size:15px;color:var(--dk);margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid #f0f0f0}
.btn{padding:9px 18px;border-radius:var(--s);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.bp{background:var(--dk);color:#fff}.bp:hover{background:var(--md)}
.bt{background:var(--tl);color:#fff}.bt:hover{background:#155f55}
.bo{background:#fff;color:var(--dk);border:1.5px solid var(--dk)}.bo:hover{background:var(--lt)}
.bg{background:var(--gd);color:#1a1000}
.bs{padding:6px 12px;font-size:12px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:1.5rem}
.sc{background:#fff;border-radius:var(--r);padding:1.25rem 1.5rem;box-shadow:0 2px 8px rgba(31,58,95,.07);border-left:4px solid transparent}
.sc.b{border-color:var(--md)}.sc.t{border-color:var(--tl)}.sc.g{border-color:var(--gd)}.sc.s{border-color:var(--ok)}
.sl{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.sv{font-size:28px;font-weight:700;color:var(--dk);line-height:1;margin-bottom:4px}
.ss{font-size:12px;color:#888}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:768px){.dg{grid-template-columns:1fr}}
.si{flex:1;min-width:180px;padding:9px 14px;border:1.5px solid #e0e0e0;border-radius:var(--s);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.si:focus{border-color:var(--md)}
.fs{padding:9px 14px;border:1.5px solid #e0e0e0;border-radius:var(--s);font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;cursor:pointer;outline:none}
table{width:100%;border-collapse:collapse}
th{background:var(--gy);color:#888;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:10px 14px;text-align:left;border-bottom:1px solid #e8e8e8}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
tr:hover td{background:var(--lt)}
.pb{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.pfh{background:var(--lt);color:var(--dk)}.ppl{background:var(--tll);color:var(--tl)}.pla{background:#FDF3E0;color:#7A5C00}.pot{background:var(--gy);color:#555}
.sbg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.sa{background:#EAF3DE;color:#3B6D11}.si2{background:#FCEBEB;color:var(--er)}
.mo{display:none;position:fixed;inset:0;background:rgba(31,58,95,.6);z-index:1000;align-items:flex-start;justify-content:center;padding:1.5rem;overflow-y:auto}
.mo.on{display:flex}
.md{background:#fff;border-radius:var(--r);width:100%;max-width:700px;box-shadow:0 20px 60px rgba(0,0,0,.25);margin:auto}
.mh{background:var(--dk);color:#fff;padding:1.25rem 1.75rem;border-radius:var(--r) var(--r) 0 0;display:flex;justify-content:space-between;align-items:center}
.mh h2{font-family:'Playfair Display',serif;font-size:17px}
.mb{padding:1.75rem;max-height:75vh;overflow-y:auto}
.mf{padding:1.25rem 1.75rem;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:10px;background:#fafafa;border-radius:0 0 var(--r) var(--r)}
.xb{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.xb:hover{background:rgba(255,255,255,.3)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:.5rem}
.ff{grid-column:1/-1}
.fg label{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid #e0e0e0;border-radius:var(--s);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--md)}
.st{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--tl);margin:1.25rem 0 .75rem;padding-bottom:4px;border-bottom:1px solid var(--tll)}
.ps{background:var(--lt);border-radius:var(--r);padding:1.25rem 1.5rem;margin-top:1rem;border:1.5px solid var(--md)}
.pr{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;color:#666}
.pt{border-top:2px solid var(--md);margin-top:8px;padding-top:10px;display:flex;justify-content:space-between;align-items:center}
.pt .pl{font-weight:700;color:var(--dk);font-size:14px}
.pt .pv{font-weight:700;color:var(--tl);font-size:22px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.sk{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:0 2px 8px rgba(31,58,95,.07);transition:transform .2s}
.sk:hover{transform:translateY(-2px)}
.sh{height:75px;display:flex;align-items:center;justify-content:center;position:relative}
.sct{position:absolute;top:7px;right:7px;font-size:9px;font-weight:600;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.85);color:#666}
.sb2{padding:12px 14px}
.sn{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--dk);margin-bottom:3px}
.snt{font-size:11px;color:#888;margin-bottom:4px}
.shot{font-size:10px;color:var(--tl);font-style:italic;margin-bottom:6px}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.ic{background:#fff;border-radius:var(--r);padding:1.25rem;box-shadow:0 2px 8px rgba(31,58,95,.07);border-top:3px solid transparent}
.ic.diffuser{border-color:var(--md)}.ic.fragrance{border-color:var(--gd)}.ic.filter{border-color:var(--tl)}.ic.chemical{border-color:var(--ok)}.ic.sensor{border-color:#6A5ACD}
.rc{background:#fff;border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:12px;box-shadow:0 2px 8px rgba(31,58,95,.07)}
.rc.lux{border-left:4px solid var(--gd)}.rc.pur{border-left:4px solid var(--tl)}.rc.fre{border-left:4px solid var(--md)}
.ph2{background:linear-gradient(135deg,var(--dk),var(--md));border-radius:var(--r);padding:1.5rem;color:#fff;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem}
.pav{width:56px;height:56px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;flex-shrink:0}
.ppb{display:inline-block;background:var(--gd);color:#1a1000;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;text-transform:uppercase;margin-top:6px}
.nvc{background:var(--tl);color:#fff;border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem}
.pvc{background:#fff;border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:12px;box-shadow:0 2px 8px rgba(31,58,95,.07)}
.ecr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5}
.ecr:last-child{border-bottom:none}
.pug{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.psl{aspect-ratio:1;background:var(--gy);border-radius:var(--s);display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed #ccc;transition:all .2s;overflow:hidden;position:relative;font-size:10px;color:#888;cursor:pointer}
.psl:hover{border-color:var(--tl);background:var(--tll)}
.psl input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--dk);color:#fff;padding:12px 20px;border-radius:var(--s);font-size:13px;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.es{text-align:center;padding:3rem 2rem;color:#888}
.es .ei{font-size:44px;margin-bottom:.75rem}
</style>
</head>
<body>
<nav>
  <div class="logo">
    <div class="lc">PP</div>
    <div class="ln">Precision<span>ProCare</span></div>
  </div>
  <div class="nav-links" id="nav-links"></div>
</nav>
<div class="main" id="main-content"></div>

<!-- MODALS -->
<div class="mo" id="mo-client">
<div class="md">
  <div class="mh"><h2 id="mc-title">New Client</h2><button class="xb" id="mc-close">✕</button></div>
  <div class="mb" id="mc-body"></div>
  <div class="mf" style="flex-wrap:wrap;gap:8px">
    <button class="btn bo" id="mc-cancel">Cancel</button>
    <div style="display:flex;gap:8px;margin-left:auto;flex-wrap:wrap">
      <button class="btn bp" id="mc-save" title="Save client and schedule 12 visits. Work starts on first scheduled date.">💾 Save &amp; Schedule</button>
      <button class="btn" id="mc-save-eval" style="background:var(--gd);color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600" title="Client wants evaluation today before committing. Charges setup fee now, schedules service for another day.">🔍 Evaluation Today</button>
    </div>
  </div>
</div>
</div>

<div class="mo" id="mo-svc">
<div class="md" style="max-width:680px">
  <div class="mh" style="background:var(--tl)"><h2>📋 Log Service Visit</h2><button class="xb" id="ms-close">✕</button></div>
  <div class="mb" id="ms-body"></div>
  <div class="mf"><button class="btn bo" id="ms-cancel">Cancel</button><button class="btn bp" id="ms-save">Save Visit</button></div>
</div>
</div>

<div class="mo" id="mo-receipt">
<div class="md" style="max-width:500px">
  <div class="mh" style="background:var(--tl)"><h2>🧾 Receipt</h2><button class="xb" id="mr-close">✕</button></div>
  <div class="mb" id="mr-body"></div>
  <div class="mf"><button class="btn bo" id="mr-cancel">Close</button><button class="btn bt" id="mr-print">🖨️ Print</button></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────
var PRICES={
  'Fresh Home':{small:119,medium:169,large:219},
  'Pure Living':{small:149,medium:189,large:235},
  'Luxury Air':{small:169,medium:199,large:245},
  'One-Time':{small:350,medium:500,large:750},
  'Construction 1-10':{small:250,medium:280,large:350},
  'Construction 11-30':{small:220,medium:250,large:320},
  'Construction 31-50+':{small:190,medium:220,large:290},
  'Casa Piloto':{small:149,medium:149,large:149},
  'Real Estate':{small:299,medium:399,large:499}
};
// Real Estate setup fees by size (first visit = setup + $49 monthly)
var RE_SETUP={small:250,medium:350,large:450}; // cleanup cost
var RE_MONTHLY=49; // fixed monthly all sizes
// Special first-visit prices for B2B
var B2B_SETUP={'Real Estate':0,'Casa Piloto':0,'Construction 1-10':0,'Construction 11-30':0,'Construction 31-50+':0};
var B2B_EXTRA_VENT={'Real Estate':15,'Casa Piloto':20,'Construction 1-10':0,'Construction 11-30':0,'Construction 31-50+':0};
var INC_V={'Fresh Home':10,'Pure Living':10,'Luxury Air':15,'Casa Piloto':10,'Real Estate':10,'Construction 1-10':0,'Construction 11-30':0,'Construction 31-50+':0};
var EV_T={'Fresh Home':2,'Pure Living':3,'Luxury Air':2};
var EV_M={'Fresh Home':'month 1 & month 7','Pure Living':'month 1, month 5 & month 9','Luxury Air':'month 1 & month 6'};
var CLNS={'Fresh Home':2,'Pure Living':3,'Luxury Air':4};
var FT={'Fresh Home':'MERV 10','Pure Living':'MERV 11','Luxury Air':'MERV 13'};
var FP={'Fresh Home':25,'Pure Living':35,'Luxury Air':45};
var PFX={'Fresh Home':'FH','Pure Living':'PL','Luxury Air':'LA','One-Time':'OT','Construction 1-10':'CB','Construction 11-30':'CB','Construction 31-50+':'CB','Casa Piloto':'CP','Real Estate':'RE'};
var PAGES=['dashboard','clients','servicelog','scents','inventory','route','portal'];
var PAGE_LABELS={'dashboard':'📊 Dashboard','clients':'👥 Clients','servicelog':'📋 Service Log','scents':'🌿 Scents','inventory':'📦 Inventory','route':'🗺️ Route','portal':'👤 Client View'};
var EXTRAS_MENU=[{n:'Extra filter MERV 10',p:25},{n:'Extra filter MERV 11',p:35},{n:'Extra filter MERV 13',p:45},{n:'Return/Handler filter (special size)',p:65},{n:'Extra vent cleaning',p:25},{n:'Dryer vent cleaning',p:99},{n:'Coil + fan deep clean',p:125},{n:'Sanitización rejillas',p:49},{n:'Mold treatment — Mild',p:149},{n:'Mold treatment — Moderate',p:249},{n:'Mold treatment — Severe',p:399},{n:'Premium inspection',p:79},{n:'Custom charge',p:0,custom:true}];
var SCENTS=[{n:'Heiress',col:'Timeless Elegance',sea:'Year Round',notes:'Iris, White Tea, Rose',int:2,em:'🌸',bg:'#FFF0F5',hotel:'5-star luxury hotel grade',type:'recurring'},{n:'Provence',col:'Revitalizing Serenity',sea:'Spring',notes:'Lavender, Vanilla, Lemon',int:2,em:'💜',bg:'#F5F0FF',hotel:'5-star spa resort grade',type:'recurring'},{n:'Caribbean',col:'Seaside Splendor',sea:'Summer',notes:'Orange, Star Fruit, Ocean',int:3,em:'🌊',bg:'#E8F5FF',hotel:'5-star beachfront resort',type:'recurring'},{n:'Noir',col:'Sophisticated Escapades',sea:'Fall',notes:'Vanilla, Tobacco, Cacao',int:3,em:'🖤',bg:'#F5F0E8',hotel:'5-star boutique hotel',type:'recurring'},{n:'Bellini',col:'Fresh Beginnings',sea:'Spring',notes:'Peach, Jasmine, Vanilla',int:2,em:'🍑',bg:'#FFF5E8',hotel:'5-star luxury resort',type:'recurring'},{n:'Lavender Classic',col:'Seasonal',sea:'Spring',notes:'Pure Lavender',int:2,em:'🌾',bg:'#F5F0FF',hotel:'Luxury spa grade',type:'both'},{n:'Lemon Fresh',col:'Seasonal',sea:'Summer',notes:'Lemon, Citrus',int:3,em:'🍋',bg:'#FFFFF0',hotel:'Luxury hotel grade',type:'both'},{n:'Cinnamon Spice',col:'Seasonal',sea:'Fall',notes:'Cinnamon, Clove, Vanilla',int:3,em:'🍂',bg:'#FFF5E8',hotel:'Luxury resort grade',type:'recurring'},{n:'Clean Cotton',col:'Seasonal',sea:'Winter',notes:'Cotton, Musk, Light Floral',int:1,em:'❄️',bg:'#F0F5FF',hotel:'5-star hotel grade',type:'recurring'},{n:'Coastline',col:'Seaside Splendor',sea:'Summer',notes:'Bergamot, Coconut, Ylang Ylang',int:2,em:'🥥',bg:'#E8FFF5',hotel:'5-star coastal resort',type:'recurring'}];
var INV=[{cat:'diffuser',n:'Diffuser 200ml',stock:10,min:5,cost:45.40},{cat:'diffuser',n:'Diffuser 800ml',stock:4,min:2,cost:116.89},{cat:'sensor',n:'Air Sensor',stock:20,min:5,cost:14.35},{cat:'fragrance',n:'HH Fragrance 500ml',stock:2,min:3,cost:105},{cat:'fragrance',n:'HH Fragrance 5L',stock:0,min:1,cost:900},{cat:'filter',n:'Filter MERV 10',stock:20,min:10,cost:3.13},{cat:'filter',n:'Filter MERV 11',stock:20,min:10,cost:3.93},{cat:'filter',n:'Filter MERV 13',stock:10,min:5,cost:5.90},{cat:'chemical',n:'Benefect Decon 30',stock:1,min:1,cost:36.04}];

// ── STATE ─────────────────────────────────────────────────────────────────
var clients=[
  {id:'PL-001',name:'ILDA GOMEZ',phone:'661-523-8532',email:'',
   addr:'1617 WAKE DR, WAKE FOREST, NC 27587',sqft:2200,year:2015,
   plan:'Pure Living',size:'medium',rate:284,vents:12,extraVents:2,
   hvac:'Lennox',units:'2',f1:'16x20x1',f1q:1,f2:'20x20x1',f2q:1,
   diff:'200ml',ds1:'JLM-001',ds2:'JLM-002',scent:'Provence',
   status:'Active',start:'2026-05-15',next:'2026-05-18',time:'09:00',
   day:'Monday',access:'',pets:'',notes:'Test client',first:true}
];
var logs=[];
var currentExtras=[];
var currentSvcId=null;
var currentPage='dashboard';
var editingClientId=null;

// ── STORAGE ───────────────────────────────────────────────────────────────
function save(){try{localStorage.setItem('ppc_c',JSON.stringify(clients));localStorage.setItem('ppc_l',JSON.stringify(logs));}catch(e){}}

// Calculate correct display amount — uses stored log data
function logDisplayAmt(log){
  if(!log||log.status==='Scheduled')return 0;
  // Always use stored total if available
  if(log.total&&log.total>0)return log.total;
  // Fallback for old logs without stored total
  var c2=clients.find(function(x){return x.id===log.clientId;});
  if(!c2)return 0;
  if(log.visitType==='evaluation'){
    var isRE2=c2.plan==='Real Estate';
    return isRE2?(RE_SETUP[c2.size||'medium']||350)+RE_MONTHLY:175;
  }
  return c2.rate;
}
function load(){
  try{
    var c=localStorage.getItem('ppc_c');
    var l=localStorage.getItem('ppc_l');
    if(c){var p=JSON.parse(c);if(p&&p.length)clients=p;}
    if(l){var p2=JSON.parse(l);if(p2&&p2.length)logs=p2;}
    // Recalculate rate for every client to fix any stale/wrong prices
    clients.forEach(function(cl){
      var isRE=cl.plan==='Real Estate';
      if(isRE){cl.rate=RE_MONTHLY;return;} // RE monthly is always $49
      var base=PRICES[cl.plan]?PRICES[cl.plan][cl.size||'medium']||0:0;
      var sec=cl.units==='2'?Math.round(base*0.5):0;
      var correct=base+sec;
      if(correct>0)cl.rate=correct;
    });
  }catch(e){}
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},3000);}

// ── NAVIGATION ────────────────────────────────────────────────────────────
function buildNav(){
  var nl=document.getElementById('nav-links');
  nl.innerHTML='';
  PAGES.forEach(function(pg){
    var b=document.createElement('button');
    b.className='nb'+(pg===currentPage?' on':'');
    b.textContent=PAGE_LABELS[pg];
    b.addEventListener('click',function(){goPage(pg);});
    nl.appendChild(b);
  });
}

function goPage(pg){
  currentPage=pg;
  buildNav();
  renderPage();
}

function renderPage(){
  var el=document.getElementById('main-content');
  if(currentPage==='dashboard') el.innerHTML=renderDashHTML();
  else if(currentPage==='clients') renderClientsPage(el);
  else if(currentPage==='servicelog') renderLogPage(el);
  else if(currentPage==='scents') renderScentsPage(el);
  else if(currentPage==='inventory') renderInventoryPage(el);
  else if(currentPage==='route') renderRoutePage(el);
  else if(currentPage==='portal') renderPortalPage(el);
  attachPageEvents();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function renderDashHTML(){
  var act=clients.filter(function(c){return c.status==='Active';});
  var rev=act.reduce(function(s,c){return s+c.rate;},0);
  var need=Math.max(0,55-act.length);
  var today=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var visits=act.filter(function(c){return c.next;}).slice(0,4).map(function(c){
    var d=new Date((c.next||'2026-01-01')+'T12:00:00');

// ── SMART SCHEDULER ─────────────────────────────────────────────────────
function getZip(addr){
  if(!addr)return '00000';
  var m=addr.match(/\d{5}/);
  return m?m[0]:'00000';
}

function getVisitsOnDate(dateStr){
  return clients.filter(function(c){return c.status==='Active'&&c.next===dateStr;});
}

// Visit slots: 3 per day — 8:30 start, ~2.5h service + 30min travel between
// Slot 1: 8:30 | Slot 2: 11:30 (2.5h service + 30min travel) | Slot 3: 14:30 (2.5h + 30min lunch)
var VISIT_SLOTS=['08:30','11:30','14:30'];

function getSlotTime(ds){
  // Count how many scheduled/completed logs are already on this date
  var taken=logs.filter(function(l){return l.date===ds;}).map(function(l){return l.time||'09:00';});
  for(var s=0;s<VISIT_SLOTS.length;s++){
    if(taken.indexOf(VISIT_SLOTS[s])===-1) return VISIT_SLOTS[s];
  }
  return VISIT_SLOTS[0]; // fallback
}

function smartAssignDate(startDate, clientAddr){
  var MAX_PER_DAY=3;
  var d=new Date(startDate+'T12:00:00');
  var clientZip=getZip(clientAddr);
  
  // Try up to 30 days forward to find best slot
  for(var i=0;i<30;i++){
    var ds=d.toISOString().split('T')[0];
    var visitsToday=logs.filter(function(l){return l.date===ds;});
    
    if(visitsToday.length<MAX_PER_DAY){
      var nearbyCount=visitsToday.filter(function(l){
        var c2=clients.find(function(x){return x.id===l.clientId;});
        return c2&&getZip(c2.addr)===clientZip;
      }).length;
      if(nearbyCount>0||visitsToday.length===0||i>6){
        var assignedTime=getSlotTime(ds);
        return {date:ds, time:assignedTime, visits:visitsToday.length, nearby:nearbyCount, full:false};
      }
    }
    d.setDate(d.getDate()+1);
    if(d.getDay()===0)d.setDate(d.getDate()+1); // Skip Sundays
  }
  return {date:startDate, time:'09:00', visits:0, nearby:0, full:false};
}

function autoAssignNextVisit(clientId){
  var c=clients.find(function(x){return x.id===clientId;});
  if(!c)return;
  // Calculate next visit from last visit or start date
  var lastLog=logs.find(function(l){return l.clientId===clientId;});
  var baseDate=lastLog?lastLog.date:c.start;
  if(!baseDate)return;
  var base=new Date(baseDate+'T12:00:00');
  base.setMonth(base.getMonth()+1);
  var startStr=base.toISOString().split('T')[0];
  var result=smartAssignDate(startStr,c.addr);
  var ci=clients.findIndex(function(x){return x.id===clientId;});
  if(ci>=0){
    clients[ci].next=result.date;
    save();
  }
  return result;
}

function openRescheduleClient(id){
  var c=clients.find(function(x){return x.id===id;});if(!c)return;
  var base=c.next||new Date().toISOString().split('T')[0];
  var result=smartAssignDate(base,c.addr);
  var msg='📅 Smart reschedule for '+c.name+'\n\nBest date: '+result.date+' @ '+result.time;
  if(result.nearby>0)msg+='\n✅ '+result.nearby+' nearby client(s) same day!';
  msg+='\n('+result.visits+'/3 visits that day)\n\nConfirm?';
  if(confirm(msg)){
    var ci=clients.findIndex(function(x){return x.id===id;});
    if(ci>=0){clients[ci].next=result.date;clients[ci].time=result.time;save();buildClientsTable(clients);toast('✅ Rescheduled to '+result.date+' @ '+result.time);}
  }
}

function checkReminders(){
  var today=new Date();
  var weekAhead=new Date(today);weekAhead.setDate(weekAhead.getDate()+7);
  var weekStr=weekAhead.toISOString().split('T')[0];
  return clients.filter(function(c){return c.status==='Active'&&c.next===weekStr;});
}

function toggleClientStatus(id){
  var idx=clients.findIndex(function(c){return c.id===id;});
  if(idx<0)return;
  var newStatus=clients[idx].status==='Active'?'Inactive':'Active';
  clients[idx].status=newStatus;
  save();
  buildClientsTable(clients);
  toast(newStatus==='Inactive'?'⏸️ Client inactivated — record kept':'✅ Client reactivated!');
}

function deleteClient(id){
  var c=clients.find(function(x){return x.id===id;});
  if(!c)return;
  var hasLogs=logs.find(function(l){return l.clientId===id;});
  var msg=hasLogs
    ?'Delete '+c.name+'?\n\nThis client has visit history. Type DELETE to confirm:'
    :'Delete '+c.name+'? Type DELETE to confirm:';
  var input=prompt(msg);
  if(!input||input.trim().toUpperCase()!=='DELETE'){toast('❌ Deletion cancelled — type DELETE to confirm');return;}
  clients=clients.filter(function(x){return x.id!==id;});
  logs=logs.filter(function(l){return l.clientId!==id;}); // also remove their logs
  save();
  buildClientsTable(clients);
  toast('🗑️ '+c.name+' deleted');
}

  ['f-name','f-addr'].forEach(function(fid){
    var el=document.getElementById(fid);
    if(el){el.addEventListener('input',function(){var pos=this.selectionStart;this.value=this.value.toUpperCase();this.setSelectionRange(pos,pos);});}
  });
  var ventsEl=document.getElementById('f-vents');
  var eventsEl=document.getElementById('f-events');
  function updateVents(){
    var planV=document.getElementById('f-plan');
    if(!ventsEl||!eventsEl||!planV)return;
    var incV=INC_V[planV.value]||10;

    eventsEl.style.color=extra>0?'#854F0B':'#666';

  if(ventsEl)ventsEl.addEventListener('input',updateVents);
  if(plan){plan.addEventListener('change',function(){updateVents();autoId();});}
  if(size){size.addEventListener('change',calcPrice);}
  if(vents){vents.addEventListener('input',calcPrice);}
  if(units){units.addEventListener('change',function(){calcPrice();var g=document.getElementById('ds2-group');if(g)g.style.display=this.value==='2'?'block':'none';});}

  if(f2q){f2q.addEventListener('change',calcPrice);}

function autoId(){
  var plan=document.getElementById('f-plan');
  var fid=document.getElementById('f-id');
  if(!plan||!fid||fid.value)return;
  var pfx=PFX[plan.value]||'PPC';
  var ex=clients.filter(function(c){return c.id&&c.id.startsWith(pfx+'-');}).map(function(c){return parseInt(c.id.split('-')[1])||0;});
  var max=ex.length?Math.max.apply(null,ex):0;
  fid.value=pfx+'-'+String(max+1).padStart(3,'0');
}

function calcPrice(){
  var plan=document.getElementById('f-plan');
  var size=document.getElementById('f-size');
  var vents=document.getElementById('f-vents');
  var units=document.getElementById('f-units');
  var f1q=document.getElementById('f-f1q');
  var f2q=document.getElementById('f-f2q');
  var box=document.getElementById('price-box');
  if(!plan||!size||!plan.value||!size.value){if(box)box.style.display='none';return;}
  var base=PRICES[plan.value]?PRICES[plan.value][size.value]||0:0;
  var incV=INC_V[plan.value]||10;
  var ev=Math.max(0,(parseInt(vents?vents.value:0)||0)-incV);
  // B2B special display — declared early so evUnitPrice can use them
  var isConstruction=plan.value.includes('Construction');
  var isCasaPiloto=plan.value==='Casa Piloto';
  var isRealEstate=plan.value==='Real Estate';
  var isB2B=isConstruction||isCasaPiloto||isRealEstate;
  var evUnitPrice=isRealEstate?15:isConstruction?15:25;
  var evc=ev*evUnitPrice;
  var evt=EV_T[plan.value]||1;
  var sec=units&&units.value==='2'?Math.round(base*0.5):0;
  var monthly=base+sec;
  var fp=FP[plan.value]||25;
  var tf=(parseInt(f1q?f1q.value:1)||1)+(parseInt(f2q?f2q.value:0)||0);
  var hvacUnits=document.getElementById('f-units')?parseInt(document.getElementById('f-units').value)||1:1;
  var includedFilters=hvacUnits===2?4:2; // 2 per HVAC system included
  var ef=Math.max(0,tf-includedFilters);
  var efc=ef*fp;
  var cl=CLNS[plan.value]||1;
  var annual=(monthly*12)+(evc*evt)+(efc*cl);
  var evEl=document.getElementById('f-events');if(evEl)evEl.value=ev;
  // For Real Estate, monthly charge is $49, but installation is base
  var actualMonthly = isRealEstate ? RE_MONTHLY : monthly;
  var rateEl=document.getElementById('f-rate');if(rateEl)rateEl.value=actualMonthly;
  var rateEl=document.getElementById('f-rate');if(rateEl)rateEl.value=actualMonthly;
  // For Real Estate: base = installation fee, monthly = $49
  var reMonthly = isRealEstate ? 49 : 0;
  var displayBase = isRealEstate ? base : base; // installation for RE, per home for construction
  var displayLabel = isConstruction?'Post-construction cleaning per home':
     isCasaPiloto?'Monthly pilot home service (min 3 months)':
     isRealEstate?'Installation fee (first visit)':
     'Base — '+plan.value+' ('+size.value+')';
  var displayUnit = isConstruction?'/home':isRealEstate?'(one-time)':'/mo';

  var rows='<div class="pr"><span>'+displayLabel+'</span><span style="font-weight:600">$'+displayBase+' '+displayUnit+'</span></div>';
  if(isRealEstate) rows+='<div class="pr"><span>Monthly maintenance</span><span style="font-weight:600">$49/mo</span></div>';
  // No setup fee for B2B
  var showSetupFee = !isB2B;

  if(isConstruction){
    var conTier=plan.value==='Construction 1-10'?'1-10 homes (standard rate)':plan.value==='Construction 11-30'?'11-30 homes (10% discount)':'31-50+ homes (20% discount)';
    rows+='<div style="background:#EAF3DE;border-radius:6px;padding:8px 10px;margin-top:6px;font-size:12px;color:#3B6D11">✅ Volume: '+conTier+'<br>Includes: deep duct clean + disinfection + post-construction dust removal<br>No setup fee · No diffuser · No monthly contract</div>';
  }
  if(isCasaPiloto){
    rows+='<div style="background:#EAF3DE;border-radius:6px;padding:8px 10px;margin-top:6px;font-size:12px;color:#3B6D11">✅ $149/mo flat rate · Includes: monthly fragrance refill + filter + report<br>Min 3 months · No setup fee · Diffuser removed when all units sold<br>💡 Buyers experience hotel scent = faster sales</div>';
  }
  if(isRealEstate){
    rows+='<div style="background:#EAF3DE;border-radius:6px;padding:8px 10px;margin-top:6px;font-size:12px;color:#3B6D11">✅ Installation: $'+base+' (first visit) · Monthly: $49 maintenance<br>Extra vents: $15 each · Agent earns 10% commission on referrals<br>Diffuser active on showing days only · Removed if buyer does not sign</div>';
  }
  if(sec>0)rows+='<div class="pr"><span>2nd HVAC (+50%)</span><span style="font-weight:600">+$'+sec+'/mo</span></div>';
  if(ef>0)rows+='<div class="pr"><span>Extra filters: '+ef+'×$'+fp+'</span><span style="font-weight:600;color:var(--tl)">+$'+efc+'/cleaning</span></div>';
  var prEl=document.getElementById('price-rows');if(prEl)prEl.innerHTML=rows;
  var moEl=document.getElementById('p-mo');if(moEl)moEl.textContent='$'+(isRealEstate?49:monthly);
  var setupAmt=showSetupFee?175:0;
  var reSize2=size&&size.value?size.value:'medium';
  var reSetupCalc=isRealEstate?(RE_SETUP[reSize2]||350):0;
  var firstVisitTotal = isRealEstate ? (reSetupCalc+RE_MONTHLY) : (monthly + setupAmt);
  var fiEl=document.getElementById('p-first');if(fiEl)fiEl.textContent='$'+firstVisitTotal;
  var setupEl=document.getElementById('p-setup');
  if(setupEl){
    if(isRealEstate){setupEl.textContent='Cleaning $'+reSetupCalc+' + $'+RE_MONTHLY+'/mo';setupEl.style.color='var(--ok)';}
    else if(showSetupFee){setupEl.textContent='$175';setupEl.style.color='';}
    else{setupEl.textContent='$0 (no setup fee)';setupEl.style.color='var(--ok)';}
  }
  var anEl=document.getElementById('p-annual');if(anEl){if(isRealEstate){anEl.textContent='';anEl.parentElement.style.display='none';}else{anEl.parentElement.style.display='';anEl.textContent='$'+annual.toLocaleString()+'/year';}}
  var evNote=document.getElementById('p-ev-note');
  if(evNote){if(ev>0){evNote.textContent='⚡ Extra vents: '+ev+' × $'+evUnitPrice+' = $'+evc+(isRealEstate?' · B2B rate':isConstruction?' · included in price':' · charged on month 2');evNote.style.display='block';}else{evNote.style.display='none';}}
  if(box)box.style.display='block';
}

function saveClient(mode){
  // mode: 'schedule' (default, Flujo A) or 'eval' (Flujo B - evaluation today)
  mode = mode || 'schedule';
  var fid=document.getElementById('f-id');
  var fname=document.getElementById('f-name');
  if(!fid||!fname||!fid.value||!fname.value){toast('⚠️ ID and Name required');return;}
  var g=function(id){var el=document.getElementById(id);return el?el.value:'';};
  // Calculate rate from PRICES to ensure accuracy
  var planVal=g('f-plan')||'Fresh Home';
  var sizeVal=g('f-size')||'medium';
  var unitsVal=g('f-units')||'1';
  var baseRate=PRICES[planVal]?PRICES[planVal][sizeVal]||0:0;
  var secRate=unitsVal==='2'?Math.round(baseRate*0.5):0;
  var isREplan2=planVal==='Real Estate';
  var calculatedRate=isREplan2?49:(baseRate+secRate);
  var savedRate=parseInt(g('f-rate'))||0;
  var finalRate=savedRate>0?savedRate:calculatedRate;
  var client={
    id:g('f-id'),name:g('f-name'),phone:g('f-phone'),email:g('f-email'),addr:g('f-addr'),
    sqft:parseInt(g('f-sqft'))||0,year:parseInt(g('f-year'))||0,
    plan:planVal,size:sizeVal,
    rate:finalRate,vents:parseInt(g('f-vents'))||10,
    extraVents:parseInt(g('f-events'))||0,hvac:g('f-hvac'),units:unitsVal,
    f1:g('f-f1'),f1q:parseInt(g('f-f1q'))||1,f2:g('f-f2'),f2q:parseInt(g('f-f2q'))||0,
    diff:g('f-diff'),ds1:g('f-ds1'),ds2:g('f-ds2'),scent:g('f-scent'),
    status:'Active',start:g('f-start'),next:g('f-next'),time:g('f-time'),day:g('f-day'),
    access:g('f-access'),pets:g('f-pets'),notes:g('f-notes'),first:true
  };
  var idx=clients.findIndex(function(c){return c.id===client.id;});
  // Check for duplicates only on new clients
  if(idx<0){
    var dupPhone=client.phone&&clients.find(function(c){return c.phone&&c.phone.replace(/\D/g,'')===client.phone.replace(/\D/g,'')&&c.id!==client.id;});
    var dupEmail=client.email&&clients.find(function(c){return c.email&&c.email.toLowerCase()===client.email.toLowerCase()&&c.id!==client.id;});
    var dupAddr=client.addr&&clients.find(function(c){return c.addr&&c.addr.toLowerCase().trim()===client.addr.toLowerCase().trim()&&c.id!==client.id;});
    if(dupPhone){if(!confirm('⚠️ A client with phone '+client.phone+' already exists ('+dupPhone.name+'). Continue anyway?'))return;}
    if(dupEmail&&!dupPhone){if(!confirm('⚠️ A client with email '+client.email+' already exists ('+dupEmail.name+'). Continue anyway?'))return;}
    if(dupAddr&&!dupPhone&&!dupEmail){if(!confirm('⚠️ A client at this address already exists ('+dupAddr.name+'). Continue anyway?'))return;}
  }
  var isNew=idx<0;
  if(idx>=0){
    var orig=clients[idx].first;
    clients[idx]=client;
    clients[idx].first=orig;
    toast('✅ Client updated!');
  } else {
    clients.push(client);
    var scheduleMode=mode;
    // Save&Schedule: first visit = today (client.start). Evaluation: first service = next agreed date
    var firstVisitDate=scheduleMode==='eval'?(client.next||client.start):client.start;
    var result=smartAssignDate(firstVisitDate, client.addr);
    var ni=clients.length-1;
    clients[ni].next=result.date;
    clients[ni].time=result.time;
    var startDateStr=result.date||client.start;
    var todayStr=new Date().toISOString().split('T')[0];
    // FLUJO B: create a Completed log for TODAY (evaluation/contract day - setup fee only)
    if(mode==='eval'){
      var isREeval=client.plan==='Real Estate';
      var evalSetup=isREeval?(RE_SETUP[client.size||'medium']||350):175;
      var evalMonthly=isREeval?RE_MONTHLY:0;
      var evalTotal=evalSetup+evalMonthly;
      logs.push({
        id:'EVAL-'+Date.now(),
        clientId:client.id,clientName:client.name,plan:client.plan,
        date:todayStr,time:new Date().toTimeString().slice(0,5),tech:'Juan Vela',
        status:'Completed',visitType:'evaluation',
        setup:evalSetup,total:evalTotal,extras:[],extTotal:0,
        filterType:FT[client.plan]||'MERV 11',clientScent:client.scent||'',
        notes:'Contract signed. Plan: '+client.plan+' ('+client.size+'). Diffuser installed.',
        f1:'No',scent:'No',benef:'No',diff:'Yes',rating:5
      });
    }
    // Auto-schedule 12 monthly service visits
    for(var m=0;m<12;m++){
      var vDate=new Date(startDateStr+'T12:00:00');
      vDate.setMonth(vDate.getMonth()+m);
      var vDateStr=vDate.toISOString().split('T')[0];
      var slotTime=getSlotTime(vDateStr);
      logs.push({
        id:'SCH-'+Date.now()+'-'+m,
        clientId:client.id,clientName:client.name,plan:client.plan,
        date:vDateStr,time:slotTime,tech:'Juan Vela',
        status:'Scheduled',total:0,extras:[],extTotal:0,setup:0,
        filterType:FT[client.plan]||'MERV 11',clientScent:client.scent||''
      });
    }
    logs.sort(function(a,b){return b.date.localeCompare(a.date);});
    var msg=scheduleMode==='eval'?'✅ Contract saved! Eval receipt opening...':'✅ Client saved! 12 visits scheduled.';
    if(result.nearby>0) msg+=' ('+result.nearby+' nearby)';
    msg+=' | First service: '+result.date+' @ '+result.time;
    toast(msg);
  }
  save();
  document.getElementById('mo-client').classList.remove('on');
  clearLicense&&clearLicense();
  if(currentPage==='clients')renderPage();
  // FLUJO B: show evaluation receipt immediately (setup fee only)
  if(mode==='eval'&&isNew){
    setTimeout(function(){openEvalReceipt(client);},300);
  }
}

    var hadEval2=!!logs.find(function(l){return l.clientId===clientId&&l.visitType==='evaluation';});
    var b2bSetup2=!isREplan&&isFirst&&!hadEval2?(B2B_SETUP[c.plan]||175):0;
    var reSetupNow=RE_SETUP[c.size||'medium']||350;
    var baseRate2=isREplan?(isFirst?reSetupNow+RE_MONTHLY:RE_MONTHLY):c.rate;
    var total2=baseRate2+extTotal2+b2bSetup2; // includes extras + setup
    var newScent2=g('sv-scent-new')||c.scent||'';
    if(newScent2&&ci2>=0)clients[ci2].scent=newScent2;
    // Extra vents: pending on first visit
    var evPending2=isFirst&&svEv2>0;
    var evPrice2=B2B_EXTRA_VENT[c.plan]!==undefined?B2B_EXTRA_VENT[c.plan]:25;
    var chk=function(id){var el=document.getElementById(id);return el&&el.type==='checkbox'?el.checked:false;};
    var li2=logs.findIndex(function(l){return l.id===logId;});
    if(li2<0){toast('❌ Error: visit not found');return;}
    logs[li2].status='Completed';
    logs[li2].date=log.date;logs[li2].time=log.time;
    logs[li2].tech=g('sv-tech');logs[li2].dur=g('sv-dur');
    logs[li2].ducts=chk('chk-ducts')?'Yes':'No';
    logs[li2].f1=chk('chk-filter')?'Yes':'No';
    logs[li2].scent=chk('chk-scent')?'Yes':'No';
    logs[li2].benef=chk('chk-benef')?'Yes':'No';
    logs[li2].diff='Yes';logs[li2].rating=parseInt(g('sv-r'))||5;
    logs[li2].notes=g('sv-n');logs[li2].vents=svV2;logs[li2].extraVents=svEv2;
    logs[li2].extras=currentExtras.slice();logs[li2].extTotal=extTotal2;
    logs[li2].setup=b2bSetup2;logs[li2].total=total2;
    logs[li2].clientScent=newScent2;
    logs[li2].isFirstSvc=isFirst;
    logs[li2].baseRate=baseRate2;
    logs[li2].evPending=evPending2;
    logs[li2].evPrice=evPrice2;
    logs[li2].evCount=svEv2;
    // Update client next visit
    var nextSch=logs.filter(function(l){return l.clientId===clientId&&l.status==='Scheduled'&&l.date>log.date;}).sort(function(a,b){return a.date.localeCompare(b.date);})[0];
    if(ci2>=0&&nextSch)clients[ci2].next=nextSch.date;
    // Inventory deductions
    if(chk('chk-filter')){var ft3=FT[c.plan]||'MERV 11';var fIdx=INV.findIndex(function(i){return i.n.includes(ft3);});if(fIdx>=0)INV[fIdx].stock=Math.max(0,INV[fIdx].stock-((c.f1q||1)+(c.f2q||0)));}
    if(chk('chk-scent')){var sIdx=INV.findIndex(function(i){return i.cat==='fragrance'&&i.n.includes('500ml');});if(sIdx>=0)INV[sIdx].stock=Math.max(0,INV[sIdx].stock-1);}
    if(chk('chk-benef')){var bIdx=INV.findIndex(function(i){return i.n.includes('Benefect');});if(bIdx>=0)INV[bIdx].stock=Math.max(0,INV[bIdx].stock-0.1);}
    save();
    document.getElementById('mo-svc').classList.remove('on');
    toast('✅ Visit completed!');
    if(currentPage==='servicelog')renderPage();
    if(currentPage==='route')buildRoute(document.getElementById('route-date')?document.getElementById('route-date').value:new Date().toISOString().split('T')[0]);
    // Show receipt after completing
    setTimeout(function(){var newLog=logs.find(function(l){return l.id===logId;});openReceiptModal(clientId,newLog?newLog.id:null);},300);
  };
  document.getElementById('mo-svc').classList.add('on');
}

function switchLogTab(tab){

          });
        })(log.id,log.clientId);
        btnDiv.appendChild(bEdit2);btnDiv.appendChild(bRecLog);btnDiv.appendChild(bDelC);

function addExtra(item){
  var p=item.p;var n=item.n;
  if(item.custom){n=prompt('Service name:');if(!n)return;p=parseFloat(prompt('Price ($):')||0);}
  currentExtras.push({n:n,p:p});
  renderExtras();
}

function renderExtras(){
  var el=document.getElementById('extras-list');
  var tel=document.getElementById('extras-total');
  if(!el)return;
  if(!currentExtras.length){el.innerHTML='<div style="font-size:12px;color:#888">No extras added</div>';if(tel)tel.textContent='$0';return;}
  el.innerHTML='';
  currentExtras.forEach(function(e,i){
    var row=document.createElement('div');row.className='ecr';
    row.innerHTML='<span style="flex:1;font-size:13px">'+e.n+'</span><span style="font-size:13px;font-weight:600;color:var(--tl);min-width:55px;text-align:right">$'+e.p+'</span>';
    var x=document.createElement('button');x.style.cssText='background:none;border:none;color:var(--er);cursor:pointer;font-size:16px;padding:2px 6px';x.textContent='✕';
    x.addEventListener('click',(function(idx){return function(){currentExtras.splice(idx,1);renderExtras();};})(i));
    row.appendChild(x);el.appendChild(row);
  });
  if(tel)tel.textContent='$'+currentExtras.reduce(function(s,e){return s+e.p;},0);
}

function saveSvc(){
  // This only runs from the manual "+ Log Visit" modal (openSvcModal)
  // openCompleteVisitModal has its own save via ms-save.onclick
  var cid=document.getElementById('sv-c')?document.getElementById('sv-c').value:'';
  if(!cid){toast('⚠️ Select a client');return;}
  var c=clients.find(function(x){return x.id===cid;});if(!c)return;
  var date=document.getElementById('sv-d')?document.getElementById('sv-d').value:'';
  var isFirst=!logs.find(function(l){return l.clientId===cid&&l.status!=='Scheduled'&&l.visitType!=='evaluation';});
  var sameDay=c.start===date;
  var isREplan=c.plan==='Real Estate';
  var hadEvalSvc=!!logs.find(function(l){return l.clientId===cid&&l.visitType==='evaluation';});
  var b2bSetupFee=typeof B2B_SETUP!=='undefined'&&B2B_SETUP[c.plan]!==undefined?B2B_SETUP[c.plan]:175;
  var setup=(isFirst||sameDay)&&!hadEvalSvc&&!isREplan?b2bSetupFee:0;
  var extTotal=currentExtras.reduce(function(s,e){return s+e.p;},0);
  // Read vents from service log form (may have been updated during visit)
  var svVentsVal=document.getElementById('sv-vents')?parseInt(document.getElementById('sv-vents').value)||c.vents||10:c.vents||10;
  var svEvVal=document.getElementById('sv-ev')?parseInt(document.getElementById('sv-ev').value)||0:0;
  // Update client vents if changed during visit
  var ci0=clients.findIndex(function(x){return x.id===cid;});
  if(ci0>=0&&svVentsVal!==clients[ci0].vents)clients[ci0].vents=svVentsVal;
  var reSetupSvc=RE_SETUP[c.size||'medium']||350;
  var baseRate=isREplan?(isFirst?reSetupSvc+RE_MONTHLY:RE_MONTHLY):c.rate;
  var total=baseRate+extTotal+(isREplan?0:setup);
  var g=function(id){var el=document.getElementById(id);return el?el.value:'';};
  var newScent=g('sv-scent-new')||c.scent||'';
  if(newScent&&newScent!==c.scent){var sci=clients.findIndex(function(x){return x.id===cid;});if(sci>=0)clients[sci].scent=newScent;}
  var log={id:'LOG-'+Date.now(),clientId:cid,clientName:c.name,plan:c.plan,
    date:date,time:g('sv-t'),tech:g('sv-tech'),status:g('sv-s'),
    f1:g('sv-f1'),scent:g('sv-sc'),benef:g('sv-b'),diff:g('sv-dif'),
    rating:parseInt(g('sv-r'))||5,notes:g('sv-n'),dur:g('sv-dur'),
    vents:svVentsVal,extraVents:svEvVal,
    extras:currentExtras.slice(),extTotal:extTotal,setup:setup,total:total,
    filterType:FT[c.plan]||'MERV 11',clientScent:c.scent||''};
  logs.unshift(log);
  var ci=clients.findIndex(function(x){return x.id===cid;});
  if(ci>=0){clients[ci].first=false;var nd=new Date(date+'T12:00:00');nd.setMonth(nd.getMonth()+1);clients[ci].next=nd.toISOString().split('T')[0];}
  // Auto-deduct inventory
  if(log.f1==='Yes'){
    var ft2=FT[c.plan]||'MERV 11';
    var fIdx=INV.findIndex(function(i){return i.n.includes(ft2);});
    var fQty=(c.f1q||1)+(c.f2q||0);
    if(fIdx>=0)INV[fIdx].stock=Math.max(0,INV[fIdx].stock-fQty);
  }
  if(log.scent==='Yes'){
    var sIdx=INV.findIndex(function(i){return i.cat==='fragrance'&&i.n.includes('500ml');});
    if(sIdx>=0)INV[sIdx].stock=Math.max(0,INV[sIdx].stock-1);
  }
  if(log.benef==='Yes'){
    var bIdx=INV.findIndex(function(i){return i.n.includes('Benefect');});
    if(bIdx>=0)INV[bIdx].stock=Math.max(0,INV[bIdx].stock-0.1);
  }
  save();
  document.getElementById('mo-svc').classList.remove('on');
  toast('✅ Visit saved!');
  if(currentPage==='servicelog')renderPage();
  if(currentPage==='route'){buildCalendar();buildRoute(document.getElementById('route-date')?document.getElementById('route-date').value:new Date().toISOString().split('T')[0]);}
}

function showReceipt(logId, clientId){
  var log=logId?logs.find(function(l){return l.id===logId;}):null;
  var c=clients.find(function(x){return x.id===clientId;});
  if(!c){toast('Client not found');return;}

  var isEval=log&&log.visitType==='evaluation';
  var date=log?new Date(log.date+'T12:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}):new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  var rnum='PPC-'+(log?log.id.slice(-6):Date.now().toString().slice(-6));
  var nextSch=logs.filter(function(l){return l.clientId===clientId&&l.status==='Scheduled';}).sort(function(a,b){return a.date.localeCompare(b.date);})[0];
  var nextDate=c.next||( nextSch?nextSch.date:'TBD');
  var nextTime=nextSch?nextSch.time:c.time||'';

  var rows='';

  if(isEval){

    var evalDesc=c.plan==='Real Estate'?'Full duct clean · filter change · diffuser reserved · showing-day setup':'Plan registered · diffuser reserved · first service: '+nextDate;

    rows+='<tr style="background:var(--tll)"><td style="padding:12px;font-weight:700;color:var(--tl);font-size:14px">TOTAL TODAY</td><td style="padding:12px;text-align:right;font-weight:700;color:var(--tl);font-size:20px">$'+evalTotal+'</td></tr>';

function buildCalendarForDate(dateStr){
  // Build calendar for the month of the given date, highlighting that date
  var d=new Date(dateStr+'T12:00:00');
  buildCalendar(d.getFullYear(), d.getMonth(), dateStr);
}

function buildCalendar(yearOverride, monthOverride, selectedDate){
  var el=document.getElementById('route-calendar');if(!el)return;
  var today=new Date();
  var todayStr=today.toISOString().split('T')[0];
  var year=yearOverride!==undefined?yearOverride:today.getFullYear();
  var month=monthOverride!==undefined?monthOverride:today.getMonth();
  var selected=selectedDate||todayStr;
  var firstDay=new Date(year,month,1).getDay();
  var daysInMonth=new Date(year,month+1,0).getDate();
  var monthName=new Date(year,month,1).toLocaleString('en',{month:'long',year:'numeric'});

  // Build visit map from Scheduled logs (future) and Completed logs (past)
  var visitMap={};
  logs.forEach(function(log){
    if(!visitMap[log.date])visitMap[log.date]=[];
    var exists=visitMap[log.date].find(function(v){return v.id===log.clientId&&v.type===log.status;});
    if(!exists)visitMap[log.date].push({name:log.clientName,id:log.clientId,type:log.status,plan:log.plan});
  });

  var html='<div class="card"><div class="ct">📅 '+monthName+' — Visit Calendar</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px">';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(d){
    html+='<div style="text-align:center;font-size:11px;font-weight:600;color:#888;padding:4px">'+d+'</div>';
  });
  html+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px" id="cal-grid">';

  for(var i=0;i<firstDay;i++){html+='<div style="min-height:52px"></div>';}

  for(var d=1;d<=daysInMonth;d++){
    var ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var visits=visitMap[ds]||[];
    var count=visits.length;
    var isToday=ds===todayStr;
    var isSelected=ds===selected&&ds!==todayStr;
    var isSun=new Date(ds+'T12:00:00').getDay()===0;
    var bg=count===0?(isSun?'#f5f5f5':'#fff'):count===1?'#E8F5F3':count===2?'#FDF3E0':'#FCEBEB';
    var bdr=isToday?'3px solid var(--tl)':isSelected?'3px solid var(--gd)':'1px solid #f0f0f0';
    var names=visits.slice(0,2).map(function(v){
      var color=v.type==='completed'?'#3B6D11':'#555';
      var prefix=v.type==='completed'?'✓ ':'';
      return '<div style="font-size:9px;color:'+color+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+prefix+v.name.split(' ')[0]+'</div>';
    }).join('');
    html+='<div class="cal-day" data-date="'+ds+'" style="min-height:52px;border-radius:8px;padding:4px 6px;background:'+bg+';border:'+bdr+';cursor:'+(count>0?'pointer':'default')+'">'
      +'<div style="font-size:12px;font-weight:'+(isToday?'700':'400')+';color:'+(isToday?'var(--tl)':'var(--dk)')+'">'+d+'</div>'
      +(count>0?'<div style="font-size:10px;font-weight:600;color:'+(count>=3?'var(--er)':count===2?'#854F0B':'var(--tl)')+'">'+count+'/3</div>'+names:'')
      +'</div>';
  }
  html+='</div>';
  html+='<div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;font-size:11px">'
    +'<div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;border-radius:3px;background:#E8F5F3;border:1px solid #ccc"></div>1 visit</div>'
    +'<div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;border-radius:3px;background:#FDF3E0;border:1px solid #ccc"></div>2 visits</div>'
    +'<div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;border-radius:3px;background:#FCEBEB;border:1px solid #ccc"></div>3 (full)</div>'
    +'<div style="color:#888">Click a day to view route</div>'
    +'</div></div>';
  el.innerHTML=html;

  // Add click events after render
  el.querySelectorAll('.cal-day[data-date]').forEach(function(div){
    div.addEventListener('click',function(){
      var dt=this.getAttribute('data-date');
      var rd=document.getElementById('route-date');
      if(rd){rd.value=dt;}
      buildRoute(dt);
      // Highlight selected day
      el.querySelectorAll('.cal-day').forEach(function(d){d.style.outline='none';d.style.outlineOffset='0';});
      this.style.outline='3px solid var(--gd)';
      this.style.outlineOffset='2px';
      // Scroll to route content
      setTimeout(function(){
        var rc=document.getElementById('route-content');
        if(rc)rc.scrollIntoView({behavior:'smooth',block:'start'});
      },300);
    });
  });
  // Highlight today by default
  // Highlight selected date
  var selDiv=el.querySelector('.cal-day[data-date="'+selected+'"]');
  if(selDiv){selDiv.style.outline='3px solid var(--gd)';selDiv.style.outlineOffset='2px';}
  var todayDiv=el.querySelector('.cal-day[data-date="'+todayStr+'"]');
  if(todayDiv&&selected!==todayStr){todayDiv.style.outline='3px solid var(--tl)';todayDiv.style.outlineOffset='2px';}
}

function buildRoute(dv){
  var el=document.getElementById('route-content');if(!el)return;
  var dateObj=new Date(dv+'T12:00:00');
  var dayName=dateObj.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  // Get scheduled visits for this date (exclude evaluations - they show separately)
  var scheduledLogs=logs.filter(function(l){return l.status==='Scheduled'&&l.date===dv&&l.visitType!=='evaluation';});
  // Completed service visits on this date
  var completedLogs=logs.filter(function(l){return l.status!=='Scheduled'&&l.date===dv&&l.visitType!=='evaluation';});
  // Evaluation/contract visits on this date
  var evalLogs=logs.filter(function(l){return l.date===dv&&l.visitType==='evaluation';});
  // Build unique client list from scheduled (priority) + completed
  var seen={};
  var list=[];
  // Add eval/contract visits first
  evalLogs.forEach(function(log){
    if(!seen[log.clientId]){
      seen[log.clientId]=true;
      var c=clients.find(function(x){return x.id===log.clientId;});
      if(c)list.push({c:c,log:log,isScheduled:false,isEval:true});
    }
  });
  scheduledLogs.concat(completedLogs).forEach(function(log){
    if(!seen[log.clientId]){
      seen[log.clientId]=true;
      var c=clients.find(function(x){return x.id===log.clientId;});
      if(c)list.push({c:c,log:log,isScheduled:log.status==='Scheduled',isEval:false});
    }
  });
  list.sort(function(a,b){return (a.c.time||'09:00').localeCompare(b.c.time||'09:00');});
  if(!list.length){el.innerHTML='<div class="es"><div class="ei">🗺️</div><h3>No visits for '+dayName+'</h3></div>';return;}

  +'<div class="card" style="margin-bottom:1.5rem"><div class="ct">🎒 Load in Van Today</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px">'
  +(merv10>0?'<div style="background:var(--gy);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px">🔵</div><div style="font-weight:600;color:var(--dk)">'+merv10+' units</div><div style="font-size:11px;color:#888">MERV 10</div></div>':'')
  +(merv11>0?'<div style="background:var(--gy);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px">🟢</div><div style="font-weight:600;color:var(--dk)">'+merv11+' units</div><div style="font-size:11px;color:#888">MERV 11</div></div>':'')
  +(merv13>0?'<div style="background:var(--gy);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px">⭐</div><div style="font-weight:600;color:var(--dk)">'+merv13+' units</div><div style="font-size:11px;color:#888">MERV 13</div></div>':'')
  +'<div style="background:var(--gy);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px">🌿</div><div style="font-weight:600;color:var(--dk);font-size:11px">'+usc.join(', ')+'</div><div style="font-size:11px;color:#888">Fragrances</div></div>'
  +'<div style="background:'+(needB?'#FCEBEB':'var(--gy)')+';;border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px">🧴</div><div style="font-weight:600;color:var(--dk);font-size:12px">'+(needB?'YES':'Not needed')+'</div><div style="font-size:11px;color:#888">Benefect</div></div>'

  +'<div class="nvc"><div style="width:46px;height:46px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">📅</div>'
  +'<div><h3 style="font-size:13px;opacity:.85;margin-bottom:4px">Next visit</h3><p style="font-size:18px;font-weight:600">'+(c.next||'TBD')+(c.time?' at '+c.time:'')+'</p></div>'
  +'<button style="margin-left:auto;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:7px 14px;border-radius:8px;font-family:DM Sans,sans-serif;font-size:12px;cursor:pointer" id="btn-reschedule">📅 Reschedule</button></div>'
  +'<div class="card" style="margin-bottom:1.5rem"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tl);margin-bottom:1rem">Your Plan Summary</div>'
  +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center"><div><div style="font-size:22px;font-weight:700;color:var(--dk)">1</div><div style="font-size:11px;color:#888">Visit/month</div></div><div><div style="font-size:22px;font-weight:700;color:var(--dk)">2</div><div style="font-size:11px;color:#888">'+ft+' filters</div></div><div><div style="font-size:22px;font-weight:700;color:var(--dk)">'+cl+'×</div><div style="font-size:11px;color:#888">Cleanings/year</div></div></div>'
  +'<div style="border-top:1px solid #f0f0f0;margin-top:12px;padding-top:12px;display:flex;align-items:center;gap:10px;font-size:13px;color:#444"><span style="font-size:20px">🌿</span><span>Current scent: <strong>'+(c.scent||'—')+'</strong></span></div></div>'
  +'<div class="card" style="margin-bottom:1.5rem"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tl);margin-bottom:1rem">🌿 Our Fragrance Collection</div>'
  +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">'+SCENTS.map(function(s){var isCurrent=s.n===c.scent;return '<div style="border-radius:8px;padding:10px;text-align:center;background:'+(isCurrent?'var(--tll)':s.bg)+';border:2px solid '+(isCurrent?'var(--tl)':'transparent')+'">'+'<div style="font-size:24px">'+s.em+'</div><div style="font-size:12px;font-weight:600;color:var(--dk)">'+s.n+'</div><div style="font-size:10px;color:#888">'+s.notes+'</div>'+(isCurrent?'<div style="font-size:10px;font-weight:700;color:var(--tl);margin-top:3px">✓ Current</div>':'')+'</div>';}).join('')
  +'</div></div>'
  +'<h3 style="font-family:Playfair Display,serif;font-size:18px;color:var(--dk);margin-bottom:1rem">Service History</h3>'
  +(!cLogs.length?'<div class="es" style="background:#fff;border-radius:var(--r)"><div class="ei">📋</div><h3>No visits yet</h3></div>'
  :cLogs.map(function(log){
    if(!log.total&&log.total!==0)return ''; // skip empty logs
    var d=new Date(log.date+'T12:00:00');
    var ds=d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    var isEval=log.visitType==='evaluation';
    var borderColor=isEval?'#94a3b8':(c.plan==='Luxury Air'?'var(--gd)':c.plan==='Pure Living'?'var(--tl)':'var(--md)');
    // Build line items from stored log data
    var items='';
    var label=isEval?'Contract & Plan Activation':(log.isFirstSvc?'First Service — '+c.plan:'Monthly Service — '+c.plan);
    if(c.plan==='Real Estate'&&log.isFirstSvc){label='Real Estate — First Service';}
    if(c.plan==='Real Estate'&&isEval){label='Contract & Plan Activation';}
    items+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f5f5f5"><span style="color:#444">'+label+'</span><span style="font-weight:600">$'+log.baseRate+'</span></div>';
    if(log.setup>0)items+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f5f5f5"><span style="color:#444">Contract & Plan Activation</span><span style="font-weight:600">$'+log.setup+'</span></div>';
    if(log.evPending&&log.evCount>0)items+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f5f5f5"><span style="color:var(--ok)">⚡ Extra vents ('+log.evCount+'×$'+log.evPrice+') — next visit</span><span style="font-weight:600;color:var(--ok)">Pending</span></div>';
    if(log.evCharged&&log.evCount>0)items+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f5f5f5"><span style="color:#444">Extra vents ('+log.evCount+'×$'+log.evPrice+')</span><span style="font-weight:600;color:var(--gd)">$'+(log.evCount*log.evPrice)+'</span></div>';
    (log.extras||[]).forEach(function(e){items+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f5f5f5"><span style="color:#444">+ '+e.n+'</span><span style="font-weight:600;color:var(--er)">$'+e.p+'</span></div>';});
    items+='<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;color:var(--tl);padding-top:8px"><span>Total</span><span>$'+log.total+'</span></div>';
    // Work performed
    var done=[
      log.ducts==='Yes'?'✅ Duct cleaning & sanitization':'',
      log.f1==='Yes'?'✅ Filters changed':'',
      log.scent==='Yes'?'✅ Scent refilled':'',
      log.benef==='Yes'?'✅ Benefect applied':''
    ].filter(Boolean);
    return '<div class="pvc" style="border-left:4px solid '+borderColor+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<div><div style="font-weight:700;color:var(--dk);font-size:15px">'+ds+'</div>'
      +'<div style="font-size:12px;color:#888;margin-top:2px">'+(log.tech||'Juan Vela')+(log.dur?' · '+log.dur+' min':'')+'</div></div>'
      +'<div style="text-align:right"><div style="font-size:18px;font-weight:700;color:var(--tl)">$'+log.total+'</div>'
      +(isEval?'<span style="font-size:10px;background:#e2e8f0;color:#475569;padding:2px 6px;border-radius:8px">CONTRACT</span>':'')
      +'</div></div>'
      +(done.length?'<div style="background:var(--tll);border-radius:6px;padding:6px 10px;margin-bottom:8px;font-size:12px;color:var(--tl)">'+done.join(' · ')+'</div>':'')
      +'<div style="background:#fafafa;border-radius:8px;padding:10px 12px;border:1px solid #f0f0f0">'+items+'</div>'
      +'</div>';
  }).join(''));
}

// ── PAGE EVENTS ───────────────────────────────────────────────────────────
function attachPageEvents(){
  // Dashboard
  var dr=document.getElementById('dash-refresh');
  if(dr)dr.addEventListener('click',function(){load();goPage('dashboard');toast('✅ Refreshed!');});
  var dreset=document.getElementById('dash-reset');
  if(dreset)dreset.addEventListener('click',function(){
    var confirm1=prompt('⚠️ This will DELETE all clients and visits.\n\nType RESET to confirm:');
    if(!confirm1||confirm1.trim().toUpperCase()!=='RESET'){toast('❌ Cancelled');return;}
    localStorage.removeItem('ppc_c');
    localStorage.removeItem('ppc_l');
    clients=[];logs=[];
    save();goPage('dashboard');
    toast('✅ All data cleared. Start fresh!');
  });
  // Clients
  var bnc=document.getElementById('btn-new-client');
  if(bnc)bnc.addEventListener('click',openNewClient);
  var cs=document.getElementById('c-search');
  if(cs)cs.addEventListener('input',function(){
    var q=this.value.toLowerCase();
    var pf=document.getElementById('c-plan-f').value;
    var sf=document.getElementById('c-status-f').value;
    buildClientsTable(clients.filter(function(c){return(!q||c.name.toLowerCase().includes(q)||c.addr.toLowerCase().includes(q)||c.id.toLowerCase().includes(q))&&(!pf||c.plan===pf)&&(!sf||c.status===sf);}));
  });
  var cpf=document.getElementById('c-plan-f');
  if(cpf)cpf.addEventListener('change',function(){var q=document.getElementById('c-search').value.toLowerCase();var sf=document.getElementById('c-status-f').value;buildClientsTable(clients.filter(function(c){return(!q||c.name.toLowerCase().includes(q))&&(!this.value||c.plan===this.value)&&(!sf||c.status===sf);}.bind(this)));});
  // Service log
  var bns=document.getElementById('btn-new-svc');
  if(bns)bns.addEventListener('click',function(){openSvcModal(null);});
  // Inventory
  var bir=document.getElementById('btn-inv-refresh');
  if(bir)bir.addEventListener('click',function(){buildInventory();toast('✅ Refreshed!');});
  // Route
  var brd=document.getElementById('route-date');
  var brv=document.getElementById('btn-route-view');
  if(brv)brv.addEventListener('click',function(){if(brd){buildCalendarForDate(brd.value);buildRoute(brd.value);}});
  if(brd)brd.addEventListener('change',function(){buildCalendarForDate(this.value);buildRoute(this.value);});
  // Portal
  var ps=document.getElementById('portal-select');
  if(ps)ps.addEventListener('change',function(){
    buildPortal(this.value);
    // Add print buttons after render
    var selId=this.value;
    setTimeout(function(){
      var cLogs2=logs.filter(function(l){return l.clientId===selId&&l.status!=='Scheduled';});
      cLogs2.forEach(function(log){
        var bc=document.getElementById('print-btn-'+log.id);
        if(bc){
          var pb=document.createElement('button');
          pb.className='btn bo bs';pb.textContent='🖨️ Print Receipt';
          pb.addEventListener('click',(function(lid3,cid3){return function(){openLogReceipt(lid3,cid3);};})(log.id,selId));
          bc.appendChild(pb);
        }
      });
    },150);
  });
}

// ── MODAL EVENTS ──────────────────────────────────────────────────────────
function setupModalEvents(){
  // Client modal
  document.getElementById('mc-close').addEventListener('click',function(){document.getElementById('mo-client').classList.remove('on');clearLicense();});
  document.getElementById('mc-cancel').addEventListener('click',function(){document.getElementById('mo-client').classList.remove('on');clearLicense();});
  document.getElementById('mc-save').addEventListener('click',function(){saveClient('schedule');});
  var mcEval=document.getElementById('mc-save-eval');
  if(mcEval)mcEval.addEventListener('click',function(){saveClient('eval');});
  // Service modal
  document.getElementById('ms-close').addEventListener('click',function(){document.getElementById('mo-svc').classList.remove('on');});
  document.getElementById('ms-cancel').addEventListener('click',function(){document.getElementById('mo-svc').classList.remove('on');});
  // ms-save is set dynamically by openSvcModal or openCompleteVisitModal — no global listener here
  // Receipt modal
  document.getElementById('mr-close').addEventListener('click',function(){document.getElementById('mo-receipt').classList.remove('on');});
  document.getElementById('mr-cancel').addEventListener('click',function(){document.getElementById('mo-receipt').classList.remove('on');});
  document.getElementById('mr-print').addEventListener('click',printReceipt);
}

// ── INIT ──────────────────────────────────────────────────────────────────
load();
buildNav();
renderPage();
setupModalEvents();
</script>
</body>
